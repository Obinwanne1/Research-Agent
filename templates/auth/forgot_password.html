<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Research Agent</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <h1>Reset Password</h1>
    <p class="sub">Enter your email to get a reset link</p>

    {% if error %}
      <div class="auth-error">{{ error }}</div>
    {% endif %}

    {% if token_link %}
      <div class="auth-success">
        <strong>Reset link generated.</strong><br>
        <span style="font-size:0.82rem;color:var(--text-muted);">Copy this link to reset your password:</span><br>
        <a href="{{ token_link }}" style="font-size:0.8rem;word-break:break-all;">{{ token_link }}</a>
        <p style="margin-top:8px;font-size:0.78rem;color:var(--text-muted);">Link expires in 1 hour.</p>
      </div>
    {% else %}
      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" class="form-control" placeholder="you@example.com" required autofocus autocomplete="email">
        </div>
        <button type="submit" class="btn btn-primary btn-full">Send Reset Link</button>
      </form>
    {% endif %}

    <div class="footer-link">
      <a href="{{ url_for('login') }}">Back to Sign In</a>
    </div>
  </div>
</div>
</body>
</html>
