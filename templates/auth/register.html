<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — Research Agent</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <h1>Create Account</h1>
    <p class="sub">Start researching in seconds</p>

    {% if error %}
      <div class="auth-error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="form-group">
        <label for="display_name">Display Name <span style="color:var(--text-muted);font-weight:400;">(optional)</span></label>
        <input type="text" id="display_name" name="display_name" class="form-control" placeholder="Your name">
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" class="form-control" placeholder="you@example.com" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password <span style="color:var(--text-muted);font-weight:400;">(min 6 characters)</span></label>
        <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:4px;">Create Account</button>
    </form>

    <div class="footer-link">
      Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
    </div>
  </div>
</div>
</body>
</html>
